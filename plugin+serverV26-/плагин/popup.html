<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyTracker</title>
  <style>
    body {
      width: 260px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    .container {
      background: white;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #333;
    }
    .status {
      padding: 8px;
      border-radius: 5px;
      margin: 10px 0;
      font-weight: bold;
    }
    .status.on {
      background: #d4edda;
      color: #155724;
    }
    .status.off {
      background: #f8d7da;
      color: #721c24;
    }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: white;
      font-size: 14px;
      transition: background 0.2s;
    }
  .btn-primary {
    background: #4a76a8;
    margin-bottom: 6px;
  }
  .btn-primary:hover {
    background: #3a5f8a;
  }
  .btn-danger {
    background: #dc3545;
  }
  .btn-danger:hover {
    background: #c82333;
  }
  .checkbox-wrap {
    text-align: left;
    font-size: 12px;
    color: #555;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #recommendations {
    margin-top: 12px;
    text-align: left;
    display: none;
  }
  #recommendations .title {
    font-size: 13px;
    font-weight: bold;
    color: #4a76a8;
    margin-bottom: 6px;
  }
  #rec-list a {
    color: #4a76a8;
    text-decoration: none;
    font-size: 12px;
    display: block;
    margin: 6px 0;
    line-height: 1.3;
  }
  #rec-list a:hover {
    text-decoration: underline;
  }
  .loading {
    font-size: 12px;
    color: #999;
    margin: 6px 0;
  }
  </style>
</head>
<body>
<div class="container">
  <h2>📚 StudyTracker</h2>
  <div id="status" class="status off">Отслеживание отключено</div>
  <button id="toggleBtn" class="btn-primary">Включить отслеживание</button>
  <div id="recommendations">
    <div class="title">📌 Рекомендации</div>
    <div id="rec-list"><div class="loading">Загрузка...</div></div>
  </div>
  <button id="clearBtn" class="btn-danger">🗑 Очистить историю</button>
  <label class="checkbox-wrap">
    <input type="checkbox" id="autoClearCheck"> Очищать историю при отключении
  </label>
</div>
<script src="browser-polyfill.js"></script>
<script src="popup.js"></script>
</body>
</html>
